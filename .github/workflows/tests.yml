# Detector de Heresias
#
# Roda a letra executável em todas as versões suportadas do Python.
# Ele é onipresente; falhar em qualquer versão seria uma contradição.
name: detector-de-heresias

on:
  push:
  pull_request:

jobs:
  verificar-onipresenca:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Invocar o Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Instalar o necessário (um violão bastaria)
        run: pip install -r requirements.txt

      - name: Cantar a música (pytest, 100% de cobertura ou heresia)
        run: pytest
